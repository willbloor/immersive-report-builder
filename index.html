<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Immersive LinkedIn Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/linkedin-builder.css?v=20260401ai" />
  </head>
  <body>
    <div id="app" class="linkedin-shell">
      <header class="linkedin-topbar">
        <div class="linkedin-topbar__row">
          <button class="brand-block brand-block--home" id="btnBrandHome" type="button" aria-label="Go to dashboard">
            <div class="brand-mark">IM</div>
            <div class="brand-copy">
              <strong>Immersive LinkedIn Builder</strong>
            </div>
          </button>
          <div class="topbar-actions">
            <button class="btn btn--primary btn--mini" id="btnTopbarNewPost" type="button">New post</button>
            <button class="btn btn--ghost btn--mini" id="btnTopbarNewCarousel" type="button">New carousel</button>
            <a class="btn btn--ghost btn--mini" id="btnOpenLocalhost" href="http://localhost:4173/" target="_blank" rel="noreferrer" hidden>Open localhost</a>
            <button class="btn btn--ghost" id="btnBackToDashboard" type="button" hidden>Back to dashboard</button>
            <button class="btn btn--ghost" id="btnUndo" type="button">Undo</button>
            <button class="btn btn--ghost" id="btnRedo" type="button">Redo</button>
            <div class="topbar-menu" id="fileMenu">
              <button class="btn btn--ghost" id="btnFileMenu" type="button" aria-haspopup="menu" aria-expanded="false">File</button>
              <div class="topbar-menu__panel" id="fileMenuPanel" role="menu" hidden>
                <button class="topbar-menu__item" id="btnImportImage" type="button" role="menuitem">Import Image</button>
                <button class="topbar-menu__item" id="btnImportJson" type="button" role="menuitem">Import JSON</button>
                <div class="topbar-menu__divider"></div>
                <button class="topbar-menu__item" id="btnExportJson" type="button" role="menuitem">Export JSON</button>
                <button class="topbar-menu__item" id="btnExportPng" type="button" role="menuitem">Export PNG</button>
                <button class="topbar-menu__item" id="btnExportPdf" type="button" role="menuitem">Export PDF</button>
                <div class="topbar-menu__divider"></div>
                <button class="topbar-menu__item topbar-menu__item--danger" id="btnResetProject" type="button" role="menuitem">Reset</button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="linkedin-dashboard" id="dashboardView">
        <section class="surface-panel dashboard-panel" id="dashboardPanel" aria-label="Dashboard"></section>
      </main>

      <div class="linkedin-main" id="editorView" hidden>
        <aside class="surface-panel sidebar-shell" aria-label="Builder sidebar">
          <div class="sidebar-panel" id="sidebarPanel"></div>
        </aside>

        <main class="surface-panel canvas-shell" aria-label="Canvas">
          <div class="canvas-head">
            <div class="canvas-head__copy">
              <strong id="canvasFrameTitle">LinkedIn frame</strong>
              <span id="canvasFrameMeta"></span>
            </div>
            <div class="canvas-head__controls" aria-label="Canvas zoom controls">
              <button class="btn btn--ghost btn--mini" id="btnCanvasZoomOut" type="button" aria-label="Zoom out">-</button>
              <button class="btn btn--ghost btn--mini" id="btnCanvasZoomFit" type="button">Fit</button>
              <button class="btn btn--ghost btn--mini" id="btnCanvasZoomIn" type="button" aria-label="Zoom in">+</button>
              <span class="canvas-zoom-label" id="canvasZoomLabel">Fit</span>
            </div>
          </div>
          <div class="canvas-viewport" id="canvasViewport"></div>
        </main>

        <aside class="surface-panel inspector-shell" aria-label="Inspector">
          <div class="inspector-panel" id="inspector"></div>
        </aside>
      </div>

      <input id="fileImportImage" type="file" accept="image/*" hidden />
      <input id="fileImportJson" type="file" accept="application/json" hidden />
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script type="module" src="./src/linkedin/main.js?v=20260401ao"></script>
    <script>
      (function () {
        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        var isFileProtocol = window.location.protocol === "file:";
        window.setTimeout(function () {
          if (document.body && document.body.dataset && document.body.dataset.appBooted === "1") {
            return;
          }
          var viewport = document.getElementById("canvasViewport");
          if (!viewport) return;
          var serverHint = "Open DevTools Console to inspect the startup error.";
          if (isFileProtocol) {
            var filePath = decodeURIComponent(window.location.pathname || "");
            if (/^\/[A-Za-z]:/.test(filePath)) filePath = filePath.slice(1);
            var projectDir = filePath.replace(/\/[^/]*$/, "") || ".";
            var command = 'cd "' + projectDir + '" && python3 -m http.server 4173';
            serverHint = "<code>" + escapeHtml(command) + "</code> then open <code>http://localhost:4173/</code>.";
          }
          viewport.innerHTML =
            '<div class="empty-state"><strong>LinkedIn builder failed to start.</strong><p>Most likely cause is opening the file directly with <code>file://</code> where module imports are blocked.</p><p>Run from a local web server: ' +
            serverHint +
            "</p></div>";
        }, 1400);
      })();
    </script>
  </body>
</html>
